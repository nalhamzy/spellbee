name: spellbee
description: "SpellBee — Spelling-bee practice with AI-generated word packs and voice feedback."
publish_to: 'none'
version: 1.0.2+3
environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State + storage
  flutter_riverpod: ^3.2.1
  shared_preferences: ^2.5.0
  equatable: ^2.0.7

  # Monetization
  google_mobile_ads: ^5.3.1
  in_app_purchase: ^3.2.0

  # Voice + speech
  flutter_tts: ^4.2.0
  speech_to_text: ^7.0.0
  permission_handler: ^11.3.1
  # Premium voice: plays OpenAI TTS mp3 bytes
  audioplayers: ^6.1.0
  path_provider: ^2.1.4

  # AI word generator (HTTP to Gemini / OpenAI — API key passed via --dart-define)
  http: ^1.2.0

  # AWS Polly Sig V4 signing
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/icon/icon_source.png"
  adaptive_icon_background: "#FFFBE8"
  adaptive_icon_foreground: "assets/icon/icon_source.png"
  remove_alpha_ios: true
  background_color_ios: "#FFFBE8"
  min_sdk_android: 23

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/audio/words/
    - assets/audio/phrases/

