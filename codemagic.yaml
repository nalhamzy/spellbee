  # ----------------------------------------------------------------------
  # ANDROID ONLY
  # ----------------------------------------------------------------------
  android-release:
    name: Android Release
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      java: 17
      groups:
        - google_play
